<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Checker Dashboard</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f9; }
textarea { width:100%; height:140px; padding:10px; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
table { width:100%; margin-top:20px; border-collapse: collapse; }
td, th { padding:10px; border:1px solid #ddd; }
.ok { color:green; font-weight:bold; }
.fail { color:red; font-weight:bold; }
.loading { color:orange; }
</style>
</head>

<body>

<h2>🌐 URL Checker</h2>

<textarea id="urls" placeholder="Enter URLs or DOIs (one per line)"></textarea>

<br>
<button onclick="runCheck()">Check Now</button>

<p id="status"></p>

<table>
<thead>
<tr>
<th>URL</th>
<th>Status</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
const API_URL = "https://url-checker-api-1qyw.onrender.com/check";

// Normalize URLs / DOIs
function normalizeUrls(input) {
  return input.split("\n")
    .map(u => u.trim())
    .filter(u => u)
    .map(u => {
      if (u.startsWith("http")) return u;
      if (u.startsWith("10.")) return "https://doi.org/" + u;
      return "https://" + u;
    });
}

// Retry fetch (handles Render cold start)
async function fetchWithRetry(url, options, retries = 3) {
  try {
    return await fetch(url, options);
  } catch (err) {
    if (retries === 0) throw err;
    document.getElementById("status").innerText = "⏳ Waking server... retrying";
    await new Promise(r => setTimeout(r, 5000));
    return fetchWithRetry(url, options, retries - 1);
  }
}

async function runCheck() {
  const input = document.getElementById("urls").value;
  if (!input) return alert("Enter URLs");

  const urls = normalizeUrls(input);

  const tbody = document.getElementById("results");
  const statusText = document.getElementById("status");

  tbody.innerHTML = "";
  statusText.innerText = "⏳ Checking URLs...";

  try {
    const res = await fetchWithRetry(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ urls })
    });

    const data = await res.json();

    statusText.innerText = "✅ Done";

    data.forEach(item => {
      const cls = item.status.includes("Working") ? "ok" : "fail";

      tbody.innerHTML += `
        <tr>
          <td>${item.url}</td>
          <td class="${cls}">${item.status}</td>
        </tr>
      `;
    });

  } catch (err) {
    statusText.innerText = "❌ Backend error. Try again in few seconds.";
  }
}
</script>

</body>
</html>
