<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Checker</title>

<style>
  body { font-family: Arial; padding: 20px; }
  textarea { width: 100%; height: 120px; }
  button { margin-top: 10px; padding: 8px 12px; }
  table { margin-top: 20px; border-collapse: collapse; width: 100%; }
  td, th { border: 1px solid #ccc; padding: 8px; }
  .ok { color: green; }
  .fail { color: red; }
</style>
</head>

<body>

<h2>URL Checker (Backend Connected)</h2>

<textarea id="urls" placeholder="Enter URLs (one per line)"></textarea><br>

<label>Interval (minutes): </label>
<input type="number" id="interval" value="30" min="1">

<br>
<button onclick="startChecking()">Start</button>
<button onclick="stopChecking()">Stop</button>

<table>
<thead>
<tr>
  <th>URL</th>
  <th>Status</th>
  <th>Last Checked</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
let timer = null;

// 🔥 IMPORTANT: Correct API endpoint
const API_URL = "https://url-checker-api-qwfh.onrender.com/check";

async function runCheck() {
  const input = document.getElementById("urls").value.trim();

  if (!input) {
    alert("Please enter at least one URL");
    return;
  }

  const urls = input.split("\n").map(u => u.trim());

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ urls })
    });

    // 🔥 Handle non-JSON safely (prevents your previous crash)
    const contentType = response.headers.get("content-type");

    if (!contentType || !contentType.includes("application/json")) {
      const text = await response.text();
      console.error("Non-JSON response:", text);
      alert("Server error. Check console.");
      return;
    }

    const data = await response.json();

    const tbody = document.getElementById("results");
    tbody.innerHTML = "";

    data.forEach(item => {
      let cls = "ok";
      if (
        item.status.includes("Fail") ||
        item.status.includes("Invalid")
      ) {
        cls = "fail";
      }

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${item.url}</td>
        <td class="${cls}">${item.status}</td>
        <td>${new Date().toLocaleTimeString()}</td>
      `;

      tbody.appendChild(row);
    });

  } catch (err) {
    console.error("Fetch error:", err);
    alert("Backend not reachable (maybe waking up, wait 30 sec)");
  }
}

function startChecking() {
  runCheck();

  const interval = parseInt(document.getElementById("interval").value) || 30;
  timer = setInterval(runCheck, interval * 60 * 1000);

  alert("Running every " + interval + " minutes");
}

function stopChecking() {
  clearInterval(timer);
  alert("Stopped");
}
</script>

</body>
</html>
