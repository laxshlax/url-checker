<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Checker</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f9; }
textarea { width:100%; height:140px; padding:10px; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
table { width:100%; margin-top:20px; border-collapse: collapse; }
td, th { padding:10px; border:1px solid #ddd; }
.ok { color:green; }
.fail { color:red; }
</style>
</head>

<body>

<h2>🌐 URL Checker (Multi URL + DOI Support)</h2>

<textarea id="urls" placeholder="Enter multiple URLs or DOIs (one per line)"></textarea>

<br>
<button onclick="runCheck()">Check Now</button>

<table>
<thead>
<tr>
<th>URL</th>
<th>Status</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
const API_URL = "https://url-checker-api-1qyw.onrender.com/check";

// Normalize URLs + DOIs
function normalizeUrls(input) {
  return input
    .split("\n")
    .map(u => u.trim())
    .filter(u => u)
    .map(u => {
      if (u.startsWith("http://") || u.startsWith("https://")) return u;
      if (u.startsWith("10.")) return "https://doi.org/" + u;
      if (u.startsWith("doi.org/")) return "https://" + u;
      return "https://" + u;
    });
}

async function runCheck() {
  const input = document.getElementById("urls").value;

  if (!input) {
    alert("Please enter URLs or DOIs");
    return;
  }

  const urls = normalizeUrls(input);

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ urls })
    });

    const data = await res.json();

    const tbody = document.getElementById("results");
    tbody.innerHTML = "";

    data.forEach(item => {
      const cls =
        item.status.includes("Fail") || item.status.includes("Invalid")
          ? "fail"
          : "ok";

      const row = `
        <tr>
          <td>${item.url}</td>
          <td class="${cls}">${item.status}</td>
        </tr>
      `;

      tbody.innerHTML += row;
    });

  } catch (err) {
    console.error(err);
    alert("Backend error (Render may be waking up, try again in 20s)");
  }
}
</script>

</body>
</html>
