<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Checker</title>
<style>
  body { font-family: Arial; padding: 20px; }
  textarea { width: 100%; height: 120px; }
  button { margin-top: 10px; padding: 8px 12px; }
  table { margin-top: 20px; border-collapse: collapse; width: 100%; }
  td, th { border: 1px solid #ccc; padding: 8px; }
  .ok { color: green; }
  .fail { color: red; }
  .warn { color: orange; }
</style>
</head>

<body>

<h2>URL Checker (Timer Enabled)</h2>

<textarea id="urls" placeholder="Enter URLs (one per line)"></textarea><br>

<label>Interval (minutes): </label>
<input type="number" id="interval" value="30" min="1">

<br>
<button onclick="startChecking()">Start</button>
<button onclick="stopChecking()">Stop</button>

<table>
<thead>
<tr>
  <th>URL</th>
  <th>Status</th>
  <th>Last Checked</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
let timer = null;

// MAIN CHECK FUNCTION
async function checkURL(url) {
  try {
    const response = await fetch(url);
    const text = await response.text();

    // DOI-specific detection
    if (text.includes("DOI Not Found")) {
      return { status: "Invalid DOI", class: "fail" };
    }

    if (response.ok) {
      return { status: "Working (" + response.status + ")", class: "ok" };
    } else {
      return { status: "Fail (" + response.status + ")", class: "fail" };
    }

  } catch (error) {
    return { status: "Blocked / Failed", class: "warn" };
  }
}

async function runCheck() {
  const urls = document.getElementById("urls").value
    .split("\n")
    .map(u => u.trim())
    .filter(u => u);

  const response = await fetch("https://url-checker-api-qwfh.onrender.com", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ urls })
  });

  const data = await response.json();

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  for (let item of data) {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${item.url}</td>
      <td>${item.status}</td>
      <td>${new Date().toLocaleTimeString()}</td>
    `;
    tbody.appendChild(row);
  }
}

// START TIMER
function startChecking() {
  const interval = parseInt(document.getElementById("interval").value) || 30;

  runCheck();
  timer = setInterval(runCheck, interval * 60 * 1000);

  alert("Running every " + interval + " minutes");
}

// STOP TIMER
function stopChecking() {
  clearInterval(timer);
  alert("Stopped");
}
</script>

</body>
</html>
