<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Checker</title>

<style>
  body { font-family: Arial; padding: 20px; }
  textarea { width: 100%; height: 120px; }
  button { margin-top: 10px; padding: 8px 12px; }
  table { margin-top: 20px; border-collapse: collapse; width: 100%; }
  td, th { border: 1px solid #ccc; padding: 8px; }
  .ok { color: green; }
  .fail { color: red; }
</style>
</head>

<body>

<h2>URL Checker (Enhanced)</h2>

<textarea id="urls" placeholder="Enter URLs or DOIs (one per line)"></textarea><br>

<label>Interval:</label>
<input type="number" id="interval" value="30" min="1">

<select id="unit">
  <option value="minutes">Minutes</option>
  <option value="hours">Hours</option>
</select>

<br><br>

<label>
  <input type="checkbox" id="emailToggle">
  Email me results
</label>

<input type="email" id="email" placeholder="Enter email" style="display:none">

<br>

<button onclick="startChecking()">Start</button>
<button onclick="stopChecking()">Stop</button>

<table>
<thead>
<tr>
  <th>URL</th>
  <th>Status</th>
  <th>Last Checked</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
const API_URL = "https://url-checker-api-qwfh.onrender.com/check";
const EMAIL_API = "https://url-checker-api-qwfh.onrender.com/send-email";

let timer = null;

// Toggle email input
document.getElementById("emailToggle").addEventListener("change", function() {
  document.getElementById("email").style.display = this.checked ? "inline" : "none";
});

// Normalize input (DOI + URL handling)
function normalizeUrls(input) {
  return input
    .split("\n")
    .map(u => u.trim())
    .filter(u => u)
    .map(u => {
      if (u.startsWith("http://") || u.startsWith("https://")) {
        return u;
      }
      if (u.startsWith("10.")) {
        return "https://doi.org/" + u;
      }
      if (u.startsWith("doi.org/")) {
        return "https://" + u;
      }
      return "https://" + u;
    });
}

// Run check
async function runCheck(sendEmail = false) {
  const input = document.getElementById("urls").value.trim();
  if (!input) return alert("Please enter URLs or DOIs");

  const urls = normalizeUrls(input);

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ urls })
    });

    const contentType = response.headers.get("content-type");

    if (!contentType || !contentType.includes("application/json")) {
      const text = await response.text();
      console.error("Server returned non-JSON:", text);
      alert("Server error. Check console.");
      return;
    }

    const data = await response.json();

    const tbody = document.getElementById("results");
    tbody.innerHTML = "";

    data.forEach(item => {
      const cls = item.status.includes("Fail") || item.status.includes("Invalid") ? "fail" : "ok";

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${item.url}</td>
        <td class="${cls}">${item.status}</td>
        <td>${new Date().toLocaleTimeString()}</td>
      `;
      tbody.appendChild(row);
    });

    // Email option
    if (sendEmail && document.getElementById("emailToggle").checked) {
      const email = document.getElementById("email").value;
      if (email) {
        await fetch(EMAIL_API, {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ email, results: data })
        });
      }
    }

  } catch (err) {
    console.error("Fetch error:", err);
    alert("Backend not reachable (wait 30s if sleeping)");
  }
}

// Start interval
function startChecking() {
  const value = parseInt(document.getElementById("interval").value);
  const unit = document.getElementById("unit").value;

  let intervalMs = value * 60 * 1000;
  if (unit === "hours") {
    intervalMs = value * 60 * 60 * 1000;
  }

  runCheck(true);
  timer = setInterval(() => runCheck(true), intervalMs);

  alert("Running every " + value + " " + unit);
}

// Stop interval
function stopChecking() {
  clearInterval(timer);
  alert("Stopped");
}
</script>

</body>
</html>
