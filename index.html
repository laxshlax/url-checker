<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Monitor Dashboard</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f9; }
textarea { width:100%; height:120px; padding:10px; }
button { padding:8px 12px; margin:5px; cursor:pointer; }
table { width:100%; margin-top:15px; border-collapse: collapse; }
td, th { padding:8px; border:1px solid #ddd; }
.ok { color:green; font-weight:bold; }
.fail { color:red; font-weight:bold; }
.section { margin-top:30px; }
input { padding:6px; }
</style>
</head>

<body>

<h2>🌐 URL Monitor Dashboard</h2>

<!-- MANUAL CHECK -->
<div class="section">
<h3>🔍 Manual Check</h3>

<textarea id="urls" placeholder="Enter URLs or DOIs (one per line)"></textarea><br>

<button onclick="runCheck()">Check Now</button>
<label>
  <input type="checkbox" id="sendEmailNow">
  Send email for this check
</label>

<p id="status"></p>

<table>
<thead>
<tr><th>URL</th><th>Status</th></tr>
</thead>
<tbody id="results"></tbody>
</table>

<!-- NEW FEATURE -->
<button onclick="addCheckedToMonitor()">➕ Add results to Monitor</button>
<label>
  <input type="checkbox" id="onlyFailed">
  Only failed URLs
</label>

</div>

<!-- EMAIL -->
<div class="section">
<h3>📧 Alert Email</h3>
<input type="email" id="email" placeholder="Enter alert email" style="width:60%">
<button onclick="setEmail()">Save Email</button>
<p id="emailStatus"></p>
</div>

<!-- SUBJECTS -->
<div class="section">
<h3>✉️ Email Subjects</h3>

<label>Manual:</label><br>
<input type="text" id="manualSubject" style="width:60%"><br><br>

<label>Monitor:</label><br>
<input type="text" id="monitorSubject" style="width:60%"><br><br>

<button onclick="setSubjects()">Save</button>
<p id="subjectStatus"></p>
</div>

<!-- INTERVAL -->
<div class="section">
<h3>⏱ Interval</h3>
<input type="number" id="interval" value="60"> minutes
<button onclick="setIntervalTime()">Update</button>
<p id="intervalStatus"></p>
</div>

<!-- MONITORED -->
<div class="section">
<h3>📋 Monitored URLs</h3>
<button onclick="loadUrls()">Refresh</button>

<table>
<thead>
<tr>
<th>URL</th>
<th>Status</th>
<th>Last Checked</th>
<th>Last Email</th>
<th>Action</th>
</tr>
</thead>
<tbody id="urlList"></tbody>
</table>
</div>

<script>
const API = "https://url-checker-api-1qyw.onrender.com";

let lastResults = [];

function normalize(u) {
  u = u.trim();
  if (u.startsWith("http")) return u;
  if (u.startsWith("10.")) return "https://doi.org/" + u;
  return "https://" + u;
}

// CHECK
async function runCheck() {
  const input = document.getElementById("urls").value;
  if (!input) return alert("Enter URLs");

  const urls = input.split("\n").map(normalize);
  const sendEmail = document.getElementById("sendEmailNow").checked;

  document.getElementById("status").innerText = "Checking...";

  const res = await fetch(API + "/check", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ urls, sendEmail })
  });

  const data = await res.json();
  lastResults = data.results;

  const tbody = document.getElementById("results");
  tbody.innerHTML = "";

  data.results.forEach(d => {
    const cls = d.status.includes("Working") ? "ok" : "fail";
    tbody.innerHTML += `<tr><td>${d.url}</td><td class="${cls}">${d.status}</td></tr>`;
  });

  document.getElementById("status").innerText = "Done";
}

// ADD MULTIPLE
async function addCheckedToMonitor() {
  if (!lastResults.length) return alert("Run check first");

  const onlyFailed = document.getElementById("onlyFailed").checked;

  const urls = lastResults
    .filter(r => !onlyFailed || !r.status.includes("Working"))
    .map(r => r.url);

  for (const url of urls) {
    await fetch(API + "/urls/add", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ url })
    });
  }

  alert("Added to monitor");
  loadUrls();
}

// LOAD
async function loadUrls() {
  const res = await fetch(API + "/urls");
  const data = await res.json();

  const tbody = document.getElementById("urlList");
  tbody.innerHTML = "";

  data.urls.forEach(u => {
    const cls = u.status.includes("Working") ? "ok" : "fail";

    tbody.innerHTML += `
      <tr>
        <td>${u.url}</td>
        <td class="${cls}">${u.status}</td>
        <td>${u.lastChecked || "-"}</td>
        <td>${u.lastEmailSent || "-"}</td>
        <td><button onclick="removeUrl('${u.url}')">Remove</button></td>
      </tr>
    `;
  });
}

// REMOVE
async function removeUrl(url) {
  await fetch(API + "/urls/remove", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url })
  });
  loadUrls();
}

loadUrls();
</script>

</body>
</html>
