<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Checker</title>

<style>
  body { font-family: Arial; padding: 20px; }
  textarea { width: 100%; height: 120px; }
  button { margin-top: 10px; padding: 8px 12px; }
  table { margin-top: 20px; border-collapse: collapse; width: 100%; }
  td, th { border: 1px solid #ccc; padding: 8px; }
  .ok { color: green; }
  .fail { color: red; }
</style>
</head>

<body>

<h2>URL Checker (Backend Powered)</h2>

<textarea id="urls" placeholder="Enter URLs (one per line)"></textarea><br>

<label>Interval (minutes): </label>
<input type="number" id="interval" value="30" min="1">

<br>
<button onclick="startChecking()">Start</button>
<button onclick="stopChecking()">Stop</button>

<table>
<thead>
<tr>
  <th>URL</th>
  <th>Status</th>
  <th>Last Checked</th>
</tr>
</thead>
<tbody id="results"></tbody>
</table>

<script>
let timer = null;

async function runCheck() {
  console.log("Running check...");

  const urls = document.getElementById("urls").value
    .split("\n")
    .map(u => u.trim())
    .filter(u => u);

  if (urls.length === 0) {
    alert("Please enter at least one URL");
    return;
  }

  try {
    const response = await fetch("https://url-checker-api-qwfh.onrender.com/check", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ urls })
    });

    const data = await response.json();

    const tbody = document.getElementById("results");
    tbody.innerHTML = "";

    for (let item of data) {
      let cls = "ok";
      if (item.status.includes("Fail") || item.status.includes("Invalid")) {
        cls = "fail";
      }

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${item.url}</td>
        <td class="${cls}">${item.status}</td>
        <td>${new Date().toLocaleTimeString()}</td>
      `;
      tbody.appendChild(row);
    }

  } catch (err) {
    console.error(err);
    alert("Error connecting to backend (maybe waking up, wait 30s and retry)");
  }
}

function startChecking() {
  const interval = parseInt(document.getElementById("interval").value) || 30;

  runCheck();
  timer = setInterval(runCheck, interval * 60 * 1000);

  alert("Running every " + interval + " minutes");
}

function stopChecking() {
  clearInterval(timer);
  alert("Stopped");
}
</script>

</body>
</html>
