<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>URL Monitor Dashboard</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f9; }
textarea { width:100%; height:120px; padding:10px; }
button { padding:8px 12px; margin:5px; cursor:pointer; }
table { width:100%; margin-top:15px; border-collapse: collapse; }
td, th { padding:8px; border:1px solid #ddd; }
.ok { color:green; font-weight:bold; }
.fail { color:red; font-weight:bold; }
.section { margin-top:30px; }
input { padding:6px; }
</style>
</head>

<body>

<h2>🌐 URL Monitor Dashboard</h2>

<!-- MANUAL CHECK -->
<div class="section">
<h3>🔍 Manual Check</h3>

<textarea id="urls" placeholder="Enter URLs or DOIs (one per line)"></textarea><br>

<button onclick="runCheck()">Check Now</button>
<label>
  <input type="checkbox" id="sendEmailNow">
  Send email for this check
</label>

<p id="status"></p>

<table>
<thead>
<tr><th>URL</th><th>Status</th></tr>
</thead>
<tbody id="results"></tbody>
</table>
</div>

<!-- EMAIL -->
<div class="section">
<h3>📧 Alert Email</h3>
<input type="email" id="email" placeholder="Enter alert email" style="width:60%">
<button onclick="setEmail()">Save Email</button>
<p id="emailStatus"></p>
</div>

<!-- INTERVAL -->
<div class="section">
<h3>⏱ Monitoring Interval</h3>
<input type="number" id="interval" value="60" min="1"> minutes
<button onclick="setIntervalTime()">Update</button>
<p id="intervalStatus"></p>
</div>

<!-- ADD URL -->
<div class="section">
<h3>➕ Add URL to Monitor</h3>
<input type="text" id="singleUrl" placeholder="Enter URL or DOI" style="width:60%">
<button onclick="addUrl()">Add</button>
<p id="addStatus"></p>
</div>

<!-- MONITORED -->
<div class="section">
<h3>📋 Monitored URLs</h3>
<button onclick="loadUrls()">Refresh</button>

<table>
<thead>
<tr>
<th>URL</th>
<th>Status</th>
<th>Last Checked</th>
<th>Last Email Sent</th>
<th>Interval</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>
<tbody id="urlList"></tbody>
</table>
</div>

<script>
const API = "https://url-checker-api-1qyw.onrender.com";

function normalize(u) {
  u = u.trim();
  if (u.startsWith("http")) return u;
  if (u.startsWith("10.")) return "https://doi.org/" + u;
  return "https://" + u;
}

// MANUAL CHECK
async function runCheck() {
  const input = document.getElementById("urls").value;
  if (!input) return alert("Enter URLs");

  const urls = input.split("\n").map(normalize);
  const sendEmail = document.getElementById("sendEmailNow").checked;

  document.getElementById("status").innerText = "Checking...";

  try {
    const res = await fetch(API + "/check", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ urls, sendEmail })
    });

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    const tbody = document.getElementById("results");
    tbody.innerHTML = "";

    data.results.forEach(d => {
      const cls = d.status.includes("Working") ? "ok" : "fail";

      tbody.innerHTML += `
        <tr>
          <td>${d.url}</td>
          <td class="${cls}">${d.status}</td>
        </tr>
      `;
    });

    document.getElementById("status").innerText = "✅ Done";

  } catch (err) {
    document.getElementById("status").innerText = "❌ " + err.message;
  }
}

// EMAIL
async function setEmail() {
  const email = document.getElementById("email").value;

  const res = await fetch(API + "/set-email", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  const data = await res.json();
  document.getElementById("emailStatus").innerText = data.message || data.error;
}

// INTERVAL
async function setIntervalTime() {
  const minutes = document.getElementById("interval").value;

  const res = await fetch(API + "/set-interval", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ minutes })
  });

  const data = await res.json();
  document.getElementById("intervalStatus").innerText = data.message || data.error;
}

// ADD
async function addUrl() {
  const input = document.getElementById("singleUrl").value;
  if (!input) return;

  const url = normalize(input);

  const res = await fetch(API + "/urls/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url })
  });

  const data = await res.json();
  document.getElementById("addStatus").innerText = data.message || data.error;

  loadUrls();
}

// LOAD
async function loadUrls() {
  const res = await fetch(API + "/urls");
  const data = await res.json();

  const { urls, interval, email } = data;

  const tbody = document.getElementById("urlList");
  tbody.innerHTML = "";

  urls.forEach(u => {
    const cls = u.status.includes("Working") ? "ok" : "fail";

    tbody.innerHTML += `
      <tr>
        <td>${u.url}</td>
        <td class="${cls}">${u.status}</td>
        <td>${u.lastChecked || "-"}</td>
        <td>${u.lastEmailSent || "-"}</td>
        <td>${interval} min</td>
        <td>${email}</td>
        <td><button onclick="removeUrl('${u.url}')">Remove</button></td>
      </tr>
    `;
  });
}

// REMOVE
async function removeUrl(url) {
  await fetch(API + "/urls/remove", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url })
  });

  loadUrls();
}

loadUrls();
</script>

</body>
</html>
